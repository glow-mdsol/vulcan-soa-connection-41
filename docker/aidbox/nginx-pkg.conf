server {
    listen 80;
    listen [::]:80;

    # Serve the hl7.fhir.r6.core package tarball as a fake npm registry.
    # Aidbox downloads: GET /-/hl7.fhir.r6.core-6.0.0-ballot3.tgz
    location /-/hl7.fhir.r6.core-6.0.0-ballot3.tgz {
        alias /usr/share/nginx/html/hl7.fhir.r6.core-6.0.0-ballot3.tgz;
        add_header Content-Type application/octet-stream;
    }

    # Serve a minimal package metadata response for the npm client
    location /hl7.fhir.r6.core {
        add_header Content-Type application/json;
        return 200 '{"name":"hl7.fhir.r6.core","dist-tags":{"latest":"6.0.0-ballot3"},"versions":{"6.0.0-ballot3":{"name":"hl7.fhir.r6.core","version":"6.0.0-ballot3","dist":{"tarball":"http://pkg-server/-/hl7.fhir.r6.core-6.0.0-ballot3.tgz"}}}}';
    }
}
